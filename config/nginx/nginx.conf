# ============================================================
# Nginx — Reverse Proxy para Odoo
# ============================================================
# Todas las conexiones llegan a Nginx en puerto 80.
# Nginx las pasa a Odoo en 127.0.0.1:8069 (mismo namespace).
# ============================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    upstream odoo_backend {
        server 127.0.0.1:8069;
    }

    upstream odoo_longpolling {
        server 127.0.0.1:8072;
    }

    # Redirigir tamaño de archivos grandes (reportes, importaciones)
    client_max_body_size 50m;

    server {
        listen 80 default_server;
        server_name _;

        # --- Headers de seguridad ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # --- Proxy general a Odoo ---
        location / {
            proxy_pass http://odoo_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts generosos para reportes pesados
            proxy_connect_timeout 720s;
            proxy_send_timeout 720s;
            proxy_read_timeout 720s;
        }

        # --- Longpolling (chat, notificaciones en tiempo real) ---
        location /longpolling {
            proxy_pass http://odoo_longpolling;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Websocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # --- Cache para assets estáticos ---
        location ~* /web/static/ {
            proxy_pass http://odoo_backend;
            proxy_cache_valid 200 60m;
            expires 24h;
            add_header Cache-Control "public, immutable";
        }

        # --- Bloquear acceso al API de SymmetricDS desde fuera ---
        location /sync/ {
            deny all;
            return 403;
        }

        # --- Health check ---
        location /nginx-health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # --- Logs ---
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log warn;
    }
}
