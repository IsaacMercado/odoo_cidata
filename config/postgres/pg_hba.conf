# ============================================================
# PostgreSQL — Control de acceso (pg_hba.conf)
# ============================================================
# Solo permite conexiones locales. PostgreSQL NO está
# expuesto fuera del namespace de red del contenedor.
# ============================================================

# TYPE  DATABASE    USER        ADDRESS         METHOD
local   all         all                         trust
host    all         all         127.0.0.1/32    md5
host    all         all         ::1/128         md5

# Rechazar todo lo demás
host    all         all         0.0.0.0/0       reject
host    all         all         ::/0            reject
