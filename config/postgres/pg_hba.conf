# ============================================================
# PostgreSQL — Control de acceso (pg_hba.conf)
# ============================================================
# Conexiones locales: trust para socket Unix
# Conexiones desde la bridge interna (cida-net): md5
# PostgreSQL NO está expuesto a la red exterior.
# ============================================================

# TYPE  DATABASE    USER        ADDRESS         METHOD
local   all         all                         trust
host    all         all         127.0.0.1/32    md5
host    all         all         ::1/128         md5
host    all         all         10.89.0.0/16    md5

# Rechazar todo lo demás
host    all         all         0.0.0.0/0       reject
host    all         all         ::/0            reject
