# ============================================================
# SymmetricDS — Nodo TURÍSTICA (Client Node)
# ============================================================
# Este nodo se registra con el nodo central y recibe
# la configuración de sync de forma automática.
# ============================================================

engine.name=turistica-corp

# --- Identidad del nodo ---
group.id=turistica
external.id=turistica-001

# --- URL de sincronización ---
# Esta es la URL por la que ESTE nodo escucha sync entrante
sync.url=http://odoo-turistica-001:31415/sync/turistica-corp

# --- Registration URL (apunta al nodo central via Tailscale) ---
registration.url=http://odoo-central-001:31415/sync/central-corp

# --- Base de datos ---
db.driver=org.postgresql.Driver
db.url=jdbc:postgresql://postgres:5432/odoo
db.user=odoo
# IMPORTANTE: Reemplazar con la contraseña real
# El script setup.sh lo hace automáticamente
db.password=POSTGRES_PASSWORD_PLACEHOLDER

# --- Opciones del nodo cliente ---
auto.registration=true
auto.reload=true

# --- Rendimiento ---
dataloader.max.rows.before.commit=10000
job.push.period.time.ms=30000
job.pull.period.time.ms=30000
job.purge.period.time.ms=3600000
purge.retention.minutes=10080

# --- Logging ---
log.level=INFO
