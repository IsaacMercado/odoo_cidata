# ============================================================
# SymmetricDS — Nodo CENTRAL (Corp Server)
# ============================================================
# Este nodo es el PRIMARIO. Define la topología de sync.
# Solo este nodo puede registrar nuevos nodos clientes.
# ============================================================

engine.name=central-corp

# --- Identidad del nodo ---
group.id=central
external.id=central-001

# --- URL de sincronización ---
# Esta es la URL por la que ESTE nodo escucha sync entrante.
# Usamos la IP Tailscale fija porque el contenedor SymmetricDS no depende
# de MagicDNS para resolver peers remotos.
sync.url=http://100.127.76.109:31415/sync/central-corp

# --- No necesita registration URL (es el corp server) ---
registration.url=

# --- Base de datos ---
db.driver=org.postgresql.Driver
db.url=jdbc:postgresql://postgres:5432/odoo
db.user=odoo
# IMPORTANTE: Reemplazar con la contraseña real
# El script setup.sh lo hace automáticamente
db.password=POSTGRES_PASSWORD_PLACEHOLDER

# --- Opciones del nodo central ---
auto.registration=true
auto.reload=true
initial.load.create.first=true

# --- Rendimiento ---
# Tamaño máximo de batch (registros por envío)
dataloader.max.rows.before.commit=10000
# Intervalo de push/pull en milisegundos (30 seg)
job.push.period.time.ms=30000
job.pull.period.time.ms=30000
# Intervalo de purga (1 hora)
job.purge.period.time.ms=3600000
# Retención de datos de sync (7 días)
purge.retention.minutes=10080

# --- Manejo de conflictos ---
# El nodo central siempre gana en caso de conflicto
# Se configura en el SQL de inicialización (init-central.sql)

# --- Logging ---
# Cambiar a DEBUG para troubleshooting
log.level=INFO
