[options]
; ----------------------------------------------------------
; Odoo 19 Community — Configuración
; ----------------------------------------------------------
; Este archivo se monta en /etc/odoo/odoo.conf
;
; La conexión a PostgreSQL se configura via variables de
; entorno (HOST, PORT, USER, PASSWORD) en el compose.
; ----------------------------------------------------------

; --- Admin ---
; admin_passwd = cambia-esta-clave-si-necesitas-usar-el-gestor-de-bases

; --- Base de datos ---
; La conexión se pasa por CLI/variables al arrancar el contenedor.
; db_host = 127.0.0.1
; db_port = 5432
; db_user = odoo
; db_password = ...
; db_name = odoo
db_maxconn = 64
db_template = template0
list_db = False

; --- Rendimiento ---
workers = 2
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200

; --- Red ---
http_port = 8069
gevent_port = 8072
proxy_mode = True

; --- Addons ---
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

; --- Logging ---
log_level = info
logfile = None
log_handler = :INFO

; --- Seguridad ---
server_wide_modules = base,web
