[options]
; ----------------------------------------------------------
; Odoo 18 Community — Configuración
; ----------------------------------------------------------
; Este archivo se monta en /etc/odoo/odoo.conf
;
; La conexión a PostgreSQL se configura via variables de
; entorno (HOST, PORT, USER, PASSWORD) en el compose.
; ----------------------------------------------------------

; --- Admin ---
admin_passwd = False

; --- Base de datos ---
db_host = False
db_port = False
db_user = False
db_password = False
db_name = False
db_maxconn = 64
db_template = template0
list_db = False

; --- Rendimiento ---
workers = 2
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200

; --- Red ---
xmlrpc_port = 8069
longpolling_port = 8072
proxy_mode = True

; --- Addons ---
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

; --- Logging ---
log_level = info
logfile = None
log_handler = :INFO

; --- Seguridad ---
server_wide_modules = base,web
