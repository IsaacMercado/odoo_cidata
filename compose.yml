# ============================================================
# Odoo CIDA — Compose Multi-Sede (Docker / Podman)
# ============================================================
# Compatible con:  docker compose  |  podman-compose
#
# Uso:
#   1. cp .env.example .env
#   2. Editar .env con los valores de la sede
#   3. ./scripts/setup.sh central|turistica
#
# ARQUITECTURA DE RED:
#   Todos los servicios en una bridge interna (`cida-net`).
#   Cada servicio publica sus propios puertos al host.
#   Tailscale corre como sidecar y SymmetricDS comparte su
#   namespace de red. El sidecar publica/acepta el tráfico
#   tailnet y reenvía 31415 a 127.0.0.1:31415, donde escucha
#   SymmetricDS en el mismo namespace.
#
# ⚠️  Las contraseñas NO están en .env.
#     Se gestionan via secrets cifrados.
#     El script setup.sh las genera automáticamente.
# ============================================================

services:
  # ----------------------------------------------------------
  # Tailscale — VPN mesh + port forwarding para sync
  # ----------------------------------------------------------
  tailscale:
    image: docker.io/tailscale/tailscale:latest
    hostname: odoo-${NODE_ID}
    container_name: tailscale-${NODE_ID}
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_ONCE=true
      - TS_EXTRA_ARGS=--hostname=odoo-${NODE_ID} --accept-routes
    secrets:
      - ts_authkey
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        export TS_AUTHKEY=$$(cat /run/secrets/ts_authkey)
        /usr/local/bin/containerboot &
        until tailscale ip -4 > /dev/null 2>&1; do sleep 2; done
        # Forward sync port (31415) to SymmetricDS in the shared network
        # namespace without downloading extra packages at boot time.
        while true; do
          nc -lk -p 31415 -e /bin/sh -c 'nc 127.0.0.1 31415' || true
          sleep 1
        done &
        echo "Tailscale up. Forwarding 31415 -> 127.0.0.1:31415"
        wait
    volumes:
      - tailscale-state:/var/lib/tailscale
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - cida-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "tailscale ip -4 > /dev/null 2>&1 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------
  # PostgreSQL 17 + pgvector — Base de datos
  # ----------------------------------------------------------
  postgres:
    image: docker.io/pgvector/pgvector:pg17
    container_name: postgres-${NODE_ID}
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - SEQUENCE_START=${SEQUENCE_START}
      - SEQUENCE_END=${SEQUENCE_END}
      - POSTGRES_PASSWORD_FILE=/run/secrets/pg_password
    secrets:
      - pg_password
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./config/postgres/init-sequences.sh:/docker-entrypoint-initdb.d/01-init-sequences.sh:ro,Z
      - ./config/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro,Z
    command: >
      postgres
        -c hba_file=/etc/postgresql/pg_hba.conf
        -c listen_addresses=*
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c work_mem=4MB
        -c max_connections=100
    networks:
      - cida-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 15s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Odoo 19 Community — ERP / POS
  # ----------------------------------------------------------
  odoo:
    image: docker.io/library/odoo:19.0
    container_name: odoo-${NODE_ID}
    secrets:
      - pg_password
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        export PASSWORD=$$(cat /run/secrets/pg_password)
        exec /usr/bin/odoo --config /etc/odoo/odoo.conf \
          --db_host=postgres \
          --db_port=5432 \
          --db_user=${POSTGRES_USER} \
          --db_password="$${PASSWORD}"
    volumes:
      - odoo-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons:Z
      - ./config/odoo/odoo.conf:/etc/odoo/odoo.conf:ro,Z
    networks:
      - cida-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://127.0.0.1:8069/web/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ----------------------------------------------------------
  # Nginx — Reverse Proxy (publica puertos al host)
  # ----------------------------------------------------------
  nginx:
    image: docker.io/library/nginx:alpine
    container_name: nginx-${NODE_ID}
    ports:
      - "${HOST_BIND_IP:-0.0.0.0}:${HOST_HTTP_PORT:-8080}:80"
      - "${HOST_BIND_IP:-0.0.0.0}:${HOST_HTTPS_PORT:-8443}:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro,Z
    networks:
      - cida-net
    depends_on:
      - odoo
    restart: unless-stopped

  # ----------------------------------------------------------
  # SymmetricDS — Sincronización bidireccional
  # ----------------------------------------------------------
  symmetricds:
    image: docker.io/jumpmind/symmetricds:latest
    container_name: symmetricds-${NODE_ID}
    network_mode: "service:tailscale"
    secrets:
      - pg_password
    volumes:
      - ./config/symmetricds/${NODE_ROLE}.properties:/opt/symmetric-ds/engines/node.properties.template:ro,Z
      - symmetricds-data:/opt/symmetric-ds/tmp
    environment:
      - SYM_NODE_ROLE=${NODE_ROLE}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        PG_PASS=$$(cat /run/secrets/pg_password)
        sed "s/POSTGRES_PASSWORD_PLACEHOLDER/$${PG_PASS}/" \
          /opt/symmetric-ds/engines/node.properties.template \
          > /opt/symmetric-ds/engines/node.properties
        exec /opt/symmetric-ds/bin/sym
    depends_on:
      - tailscale
      - postgres
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 31415 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ----------------------------------------------------------
  # Backup — pg_dump automático cada N horas
  # ----------------------------------------------------------
  backup:
    image: docker.io/library/postgres:17-alpine
    container_name: backup-${NODE_ID}
    secrets:
      - pg_password
    environment:
      - PGUSER=${POSTGRES_USER}
      - PGDATABASE=${POSTGRES_DB}
      - PGHOST=postgres
      - RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - INTERVAL_HOURS=${BACKUP_INTERVAL_HOURS:-6}
    volumes:
      - ./backups:/backups:Z
      - ./scripts/backup.sh:/backup.sh:ro,Z
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        export PGPASSWORD=$$(cat /run/secrets/pg_password)
        echo "Backup service started. Interval: $${INTERVAL_HOURS}h, Retention: $${RETENTION_DAYS}d"
        while true; do
          /backup.sh
          echo "Next backup in $${INTERVAL_HOURS} hours..."
          sleep $$(( INTERVAL_HOURS * 3600 ))
        done
    networks:
      - cida-net
    depends_on:
      - postgres
    restart: unless-stopped

# ----------------------------------------------------------
# Red interna — bridge
# ----------------------------------------------------------
networks:
  cida-net:
    driver: bridge

# ----------------------------------------------------------
# Secretos — Almacenados cifrados
# ----------------------------------------------------------
# Docker:  docker secret create <nombre> -
# Podman:  podman secret create <nombre> -
#
# NO son archivos legibles en el filesystem.
# Solo se inyectan como /run/secrets/<nombre> dentro del
# contenedor, y solo al contenedor que los necesita.
# ----------------------------------------------------------
secrets:
  pg_password:
    external: true
  ts_authkey:
    external: true

# ----------------------------------------------------------
# Volúmenes persistentes
# ----------------------------------------------------------
volumes:
  tailscale-state:
    name: cida-tailscale-${NODE_ID}
  pg-data:
    name: cida-pgdata-${NODE_ID}
  odoo-data:
    name: cida-odoo-data-${NODE_ID}
  odoo-addons:
    name: cida-odoo-addons-${NODE_ID}
  symmetricds-data:
    name: cida-symmetricds-${NODE_ID}
