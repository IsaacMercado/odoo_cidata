# ============================================================
# Odoo CIDA — Compose Multi-Sede (Docker / Podman)
# ============================================================
# Compatible con:  docker compose  |  podman-compose
#
# Uso:
#   1. cp .env.example .env
#   2. Editar .env con los valores de la sede
#   3. ./scripts/setup.sh central|turistica
#
# ⚠️  Las contraseñas NO están en .env.
#     Se gestionan via secrets cifrados.
#     El script setup.sh las genera automáticamente.
# ============================================================

services:
  # ----------------------------------------------------------
  # Tailscale — VPN mesh (contenedor aislado del host)
  # ----------------------------------------------------------
  tailscale:
    image: docker.io/tailscale/tailscale:latest
    hostname: odoo-${NODE_ID}
    container_name: tailscale-${NODE_ID}
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--hostname=odoo-${NODE_ID} --accept-routes
    secrets:
      - ts_authkey
    # Tailscale lee TS_AUTHKEY, usamos entrypoint wrapper
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export TS_AUTHKEY=$$(cat /run/secrets/ts_authkey)
        exec /usr/local/bin/containerboot
    volumes:
      - tailscale-state:/var/lib/tailscale
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      # Solo accesible desde la máquina local
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
      - "127.0.0.1:8069:8069"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "tailscale", "status", "--json"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------
  # PostgreSQL 16 — Base de datos
  # ----------------------------------------------------------
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: postgres-${NODE_ID}
    network_mode: "service:tailscale"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - SEQUENCE_START=${SEQUENCE_START}
      - SEQUENCE_END=${SEQUENCE_END}
      # PostgreSQL soporta _FILE para leer contraseñas desde archivo
      - POSTGRES_PASSWORD_FILE=/run/secrets/pg_password
    secrets:
      - pg_password
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./config/postgres/init-sequences.sh:/docker-entrypoint-initdb.d/01-init-sequences.sh:ro
      - ./config/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: >
      postgres
        -c hba_file=/etc/postgresql/pg_hba.conf
        -c listen_addresses=127.0.0.1
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c work_mem=4MB
        -c max_connections=100
    depends_on:
      tailscale:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Odoo 18 Community — ERP / POS
  # ----------------------------------------------------------
  odoo:
    image: docker.io/library/odoo:18.0
    container_name: odoo-${NODE_ID}
    network_mode: "service:tailscale"
    environment:
      - HOST=127.0.0.1
      - PORT=5432
      - USER=${POSTGRES_USER}
    secrets:
      - pg_password
    # Odoo no soporta PASSWORD_FILE, usamos wrapper
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export PASSWORD=$$(cat /run/secrets/pg_password)
        exec /usr/bin/odoo --config /etc/odoo/odoo.conf
    volumes:
      - odoo-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
      - ./config/odoo/odoo.conf:/etc/odoo/odoo.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8069/web/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ----------------------------------------------------------
  # Nginx — Reverse Proxy
  # ----------------------------------------------------------
  nginx:
    image: docker.io/library/nginx:alpine
    container_name: nginx-${NODE_ID}
    network_mode: "service:tailscale"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      odoo:
        condition: service_healthy
    restart: unless-stopped

  # ----------------------------------------------------------
  # SymmetricDS — Sincronización bidireccional
  # ----------------------------------------------------------
  symmetricds:
    image: docker.io/jumpmind/symmetricds:latest
    container_name: symmetricds-${NODE_ID}
    network_mode: "service:tailscale"
    secrets:
      - pg_password
    volumes:
      - ./config/symmetricds/${NODE_ROLE}.properties:/opt/symmetric-ds/engines/node.properties.template:ro
      - symmetricds-data:/opt/symmetric-ds/tmp
    environment:
      - SYM_NODE_ROLE=${NODE_ROLE}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    # Inyectar password en el properties antes de arrancar
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        PG_PASS=$$(cat /run/secrets/pg_password)
        sed "s/POSTGRES_PASSWORD_PLACEHOLDER/$${PG_PASS}/" \
          /opt/symmetric-ds/engines/node.properties.template \
          > /opt/symmetric-ds/engines/node.properties
        exec /opt/symmetric-ds/bin/sym
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:31415/api/engine/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ----------------------------------------------------------
  # Backup — pg_dump automático cada N horas
  # ----------------------------------------------------------
  backup:
    image: docker.io/library/postgres:16-alpine
    container_name: backup-${NODE_ID}
    network_mode: "service:tailscale"
    secrets:
      - pg_password
    environment:
      - PGUSER=${POSTGRES_USER}
      - PGDATABASE=${POSTGRES_DB}
      - PGHOST=127.0.0.1
      - RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - INTERVAL_HOURS=${BACKUP_INTERVAL_HOURS:-6}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export PGPASSWORD=$$(cat /run/secrets/pg_password)
        echo "Backup service started. Interval: $${INTERVAL_HOURS}h, Retention: $${RETENTION_DAYS}d"
        while true; do
          /backup.sh
          echo "Next backup in $${INTERVAL_HOURS} hours..."
          sleep $$(( INTERVAL_HOURS * 3600 ))
        done
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

# ----------------------------------------------------------
# Secretos — Almacenados cifrados
# ----------------------------------------------------------
# Docker:  docker secret create <nombre> -
# Podman:  podman secret create <nombre> -
#
# NO son archivos legibles en el filesystem.
# Solo se inyectan como /run/secrets/<nombre> dentro del
# contenedor, y solo al contenedor que los necesita.
# ----------------------------------------------------------
secrets:
  pg_password:
    external: true
  ts_authkey:
    external: true

# ----------------------------------------------------------
# Volúmenes persistentes
# ----------------------------------------------------------
volumes:
  tailscale-state:
    name: cida-tailscale-${NODE_ID}
  pg-data:
    name: cida-pgdata-${NODE_ID}
  odoo-data:
    name: cida-odoo-data-${NODE_ID}
  odoo-addons:
    name: cida-odoo-addons-${NODE_ID}
  symmetricds-data:
    name: cida-symmetricds-${NODE_ID}
